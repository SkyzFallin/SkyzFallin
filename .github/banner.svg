<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <g opacity="0.04" fill="#818cf8">
    <circle cx="40" cy="40" r="1.5"/><circle cx="40" cy="80" r="1.5"/><circle cx="40" cy="120" r="1.5"/><circle cx="40" cy="160" r="1.5"/><circle cx="40" cy="200" r="1.5"/><circle cx="40" cy="240" r="1.5"/><circle cx="40" cy="280" r="1.5"/>
    <circle cx="80" cy="40" r="1.5"/><circle cx="80" cy="80" r="1.5"/><circle cx="80" cy="120" r="1.5"/><circle cx="80" cy="160" r="1.5"/><circle cx="80" cy="200" r="1.5"/><circle cx="80" cy="240" r="1.5"/><circle cx="80" cy="280" r="1.5"/>
    <circle cx="120" cy="40" r="1.5"/><circle cx="120" cy="80" r="1.5"/><circle cx="120" cy="120" r="1.5"/><circle cx="120" cy="160" r="1.5"/><circle cx="120" cy="200" r="1.5"/><circle cx="120" cy="240" r="1.5"/><circle cx="120" cy="280" r="1.5"/>
    <circle cx="1160" cy="40" r="1.5"/><circle cx="1160" cy="80" r="1.5"/><circle cx="1160" cy="120" r="1.5"/><circle cx="1160" cy="160" r="1.5"/><circle cx="1160" cy="200" r="1.5"/><circle cx="1160" cy="240" r="1.5"/><circle cx="1160" cy="280" r="1.5"/>
    <circle cx="1200" cy="40" r="1.5"/><circle cx="1200" cy="80" r="1.5"/><circle cx="1200" cy="120" r="1.5"/><circle cx="1200" cy="160" r="1.5"/><circle cx="1200" cy="200" r="1.5"/><circle cx="1200" cy="240" r="1.5"/><circle cx="1200" cy="280" r="1.5"/>
    <circle cx="1240" cy="40" r="1.5"/><circle cx="1240" cy="80" r="1.5"/><circle cx="1240" cy="120" r="1.5"/><circle cx="1240" cy="160" r="1.5"/><circle cx="1240" cy="200" r="1.5"/><circle cx="1240" cy="240" r="1.5"/><circle cx="1240" cy="280" r="1.5"/>
  </g>

  <!-- Decorative code brackets - left -->
  <g transform="translate(180, 80)" opacity="0.07">
    <text font-family="monospace" font-size="160" fill="#818cf8">{</text>
  </g>

  <!-- Decorative code brackets - right -->
  <g transform="translate(1000, 80)" opacity="0.07">
    <text font-family="monospace" font-size="160" fill="#818cf8">}</text>
  </g>

  <!-- Cloud 1 - large, top left -->
  <g transform="translate(55, 15)" opacity="0.45">
    <path d="M30 38 C18 38 9 30 14 23 C12 16 20 11 28 14 C30 6 42 4 50 10 C56 5 68 10 65 18 C72 18 75 28 68 33 C70 38 30 38 30 38Z" stroke="#818cf8" stroke-width="1.5" fill="#818cf8" fill-opacity="0.08"/>
    <line x1="26" y1="42" x2="24" y2="52" stroke="#818cf8" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="38" y1="42" x2="36" y2="56" stroke="#818cf8" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="50" y1="42" x2="48" y2="50" stroke="#818cf8" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="60" y1="40" x2="58" y2="54" stroke="#818cf8" stroke-width="1.3" stroke-linecap="round"/>
  </g>

  <!-- Cloud 2 - medium, top center-right -->
  <g transform="translate(850, 10)" opacity="0.4">
    <path d="M18 26 C10 26 5 21 8 16 C7 11 13 8 17 10 C18 5 26 3 31 7 C35 4 43 7 41 13 C45 13 47 19 42 22 C44 26 18 26 18 26Z" stroke="#c084fc" stroke-width="1.5" fill="#c084fc" fill-opacity="0.07"/>
    <line x1="16" y1="29" x2="14" y2="37" stroke="#c084fc" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="25" y1="29" x2="23" y2="39" stroke="#c084fc" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="34" y1="28" x2="32" y2="36" stroke="#c084fc" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- Cloud 3 - small, left mid -->
  <g transform="translate(25, 160)" opacity="0.35">
    <path d="M12 18 C7 18 4 14 6 11 C5 8 9 6 12 7 C13 4 18 3 21 5 C24 3 28 5 27 9 C30 9 31 13 28 15 C29 18 12 18 12 18Z" stroke="#f472b6" stroke-width="1.3" fill="#f472b6" fill-opacity="0.06"/>
    <line x1="11" y1="20" x2="10" y2="26" stroke="#f472b6" stroke-width="1.1" stroke-linecap="round"/>
    <line x1="18" y1="20" x2="17" y2="28" stroke="#f472b6" stroke-width="1.1" stroke-linecap="round"/>
  </g>

  <!-- Cloud 4 - large, far right -->
  <g transform="translate(1150, 20)" opacity="0.45">
    <path d="M25 32 C15 32 8 26 12 20 C10 14 18 10 24 12 C26 6 36 4 42 9 C48 5 58 9 56 16 C62 16 64 24 58 28 C60 32 25 32 25 32Z" stroke="#818cf8" stroke-width="1.5" fill="#818cf8" fill-opacity="0.08"/>
    <line x1="22" y1="36" x2="20" y2="46" stroke="#818cf8" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="32" y1="36" x2="30" y2="50" stroke="#818cf8" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="42" y1="36" x2="40" y2="44" stroke="#818cf8" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="52" y1="34" x2="50" y2="48" stroke="#818cf8" stroke-width="1.3" stroke-linecap="round"/>
  </g>

  <!-- Cloud 5 - medium, right low -->
  <g transform="translate(1160, 210)" opacity="0.35">
    <path d="M15 22 C9 22 5 18 8 14 C7 10 12 8 16 9 C17 5 24 4 28 7 C32 4 38 7 37 12 C40 12 42 17 38 20 C40 22 15 22 15 22Z" stroke="#c084fc" stroke-width="1.3" fill="#c084fc" fill-opacity="0.06"/>
    <line x1="14" y1="25" x2="13" y2="33" stroke="#c084fc" stroke-width="1.1" stroke-linecap="round"/>
    <line x1="22" y1="25" x2="21" y2="35" stroke="#c084fc" stroke-width="1.1" stroke-linecap="round"/>
    <line x1="30" y1="24" x2="29" y2="32" stroke="#c084fc" stroke-width="1.1" stroke-linecap="round"/>
  </g>

  <!-- Cloud 6 - small, bottom left -->
  <g transform="translate(120, 265)" opacity="0.35">
    <path d="M10 15 C6 15 3 12 5 9 C4 7 8 5 10 6 C11 3 15 2 18 4 C20 3 24 4 23 8 C25 8 26 11 24 13 C25 15 10 15 10 15Z" stroke="#818cf8" stroke-width="1.2" fill="#818cf8" fill-opacity="0.06"/>
    <line x1="9" y1="17" x2="8" y2="22" stroke="#818cf8" stroke-width="1" stroke-linecap="round"/>
    <line x1="15" y1="17" x2="14" y2="23" stroke="#818cf8" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Cloud 7 - small, bottom center-right -->
  <g transform="translate(900, 270)" opacity="0.35">
    <path d="M12 18 C7 18 4 14 6 11 C5 8 9 6 12 7 C13 4 18 3 21 5 C24 3 28 5 27 9 C30 9 31 13 28 15 C29 18 12 18 12 18Z" stroke="#f472b6" stroke-width="1.3" fill="#f472b6" fill-opacity="0.06"/>
    <line x1="11" y1="20" x2="10" y2="26" stroke="#f472b6" stroke-width="1.1" stroke-linecap="round"/>
    <line x1="18" y1="20" x2="17" y2="28" stroke="#f472b6" stroke-width="1.1" stroke-linecap="round"/>
    <line x1="24" y1="19" x2="23" y2="25" stroke="#f472b6" stroke-width="1.1" stroke-linecap="round"/>
  </g>

  <!-- Crashing stock chart - left side -->
  <g transform="translate(280, 40)" opacity="0.35">
    <polyline points="0,10 15,8 30,12 45,6 60,14 75,10 90,20 105,18 120,30 135,45 150,55 160,70" stroke="#f472b6" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Candle sticks -->
    <line x1="15" y1="5" x2="15" y2="14" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
    <line x1="45" y1="3" x2="45" y2="12" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
    <line x1="75" y1="7" x2="75" y2="16" stroke="#f472b6" stroke-width="2" stroke-linecap="round"/>
    <line x1="105" y1="14" x2="105" y2="24" stroke="#f472b6" stroke-width="2" stroke-linecap="round"/>
    <line x1="135" y1="38" x2="135" y2="52" stroke="#f472b6" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Crashing stock chart - right side -->
  <g transform="translate(1050, 160)" opacity="0.35">
    <polyline points="0,5 12,3 24,8 36,4 48,12 60,18 72,15 84,28 96,40 108,52" stroke="#f472b6" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="12" y1="0" x2="12" y2="8" stroke="#818cf8" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="36" y1="1" x2="36" y2="9" stroke="#818cf8" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="60" y1="14" x2="60" y2="24" stroke="#f472b6" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="84" y1="22" x2="84" y2="34" stroke="#f472b6" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- Glow behind name -->
  <ellipse cx="640" cy="120" rx="220" ry="60" fill="#818cf8" opacity="0.04"/>

  <!-- Name with gradient -->
  <text x="640" y="125" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="56" font-weight="700" fill="url(#nameGrad)" text-anchor="middle" letter-spacing="-1">
    SkyzFallin
  </text>

  <!-- Funny subtitle -->
  <text x="640" y="158" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#e2e8f0" text-anchor="middle" font-style="italic" opacity="0.35">
    when the sky falls, I buy the dip
  </text>

  <!-- Divider line -->
  <line x1="520" y1="178" x2="760" y2="178" stroke="#818cf8" stroke-width="1" opacity="0.2"/>

  <!-- Tech icons row - brighter -->
  <g transform="translate(0, 198)">
    <!-- Terminal prompt -->
    <g transform="translate(460, 0)" opacity="0.55">
      <rect x="0" y="0" width="44" height="32" rx="4" stroke="#818cf8" stroke-width="1.5" fill="#818cf8" fill-opacity="0.08"/>
      <text x="10" y="22" font-family="monospace" font-size="14" fill="#818cf8">$_</text>
    </g>

    <!-- Code file -->
    <g transform="translate(530, 0)" opacity="0.55">
      <rect x="0" y="0" width="44" height="32" rx="4" stroke="#f472b6" stroke-width="1.5" fill="#f472b6" fill-opacity="0.08"/>
      <text x="8" y="22" font-family="monospace" font-size="12" fill="#f472b6">&lt;/&gt;</text>
    </g>

    <!-- Git branch -->
    <g transform="translate(600, 0)" opacity="0.55">
      <rect x="0" y="0" width="44" height="32" rx="4" stroke="#818cf8" stroke-width="1.5" fill="#818cf8" fill-opacity="0.08"/>
      <circle cx="15" cy="12" r="3" stroke="#818cf8" stroke-width="1.5" fill="none"/>
      <circle cx="30" cy="22" r="3" stroke="#818cf8" stroke-width="1.5" fill="none"/>
      <line x1="15" y1="15" x2="30" y2="19" stroke="#818cf8" stroke-width="1.5"/>
    </g>

    <!-- Database -->
    <g transform="translate(670, 0)" opacity="0.55">
      <rect x="0" y="0" width="44" height="32" rx="4" stroke="#f472b6" stroke-width="1.5" fill="#f472b6" fill-opacity="0.08"/>
      <ellipse cx="22" cy="11" rx="10" ry="4" stroke="#f472b6" stroke-width="1.5" fill="none"/>
      <line x1="12" y1="11" x2="12" y2="23" stroke="#f472b6" stroke-width="1.5"/>
      <line x1="32" y1="11" x2="32" y2="23" stroke="#f472b6" stroke-width="1.5"/>
      <ellipse cx="22" cy="23" rx="10" ry="4" stroke="#f472b6" stroke-width="1.5" fill="none"/>
    </g>

    <!-- Cloud -->
    <g transform="translate(740, 0)" opacity="0.55">
      <rect x="0" y="0" width="44" height="32" rx="4" stroke="#818cf8" stroke-width="1.5" fill="#818cf8" fill-opacity="0.08"/>
      <path d="M14 22 C10 22 8 19 10 16 C10 13 14 12 16 13 C17 10 22 9 25 11 C28 9 33 11 33 14 C36 14 37 18 34 20 C35 22 14 22 14 22Z" stroke="#818cf8" stroke-width="1.2" fill="none"/>
    </g>
  </g>

  <!-- Falling code snippets scattered around -->
  <g opacity="0.35">
    <text x="150" y="180" font-family="monospace" font-size="11" fill="#c084fc" transform="rotate(-8, 150, 180)">if sky == falling:</text>
    <text x="920" y="260" font-family="monospace" font-size="10" fill="#818cf8" transform="rotate(5, 920, 260)">return "nah"</text>
    <text x="100" y="270" font-family="monospace" font-size="10" fill="#f472b6" transform="rotate(-3, 100, 270)">git push --force</text>
    <text x="1050" y="200" font-family="monospace" font-size="11" fill="#c084fc" transform="rotate(4, 1050, 200)">except SkyFall:</text>
    <text x="1080" y="280" font-family="monospace" font-size="10" fill="#818cf8" transform="rotate(-6, 1080, 280)">pass</text>
  </g>

  <!-- Bottom accent -->
  <rect x="0" y="316" width="1280" height="4" fill="url(#accent)" opacity="0.4"/>
</svg>
