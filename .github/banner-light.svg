<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="50%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#6366f1" stroke-width="0.5">
    <line x1="0" y1="64" x2="1280" y2="64"/>
    <line x1="0" y1="128" x2="1280" y2="128"/>
    <line x1="0" y1="192" x2="1280" y2="192"/>
    <line x1="0" y1="256" x2="1280" y2="256"/>
    <line x1="256" y1="0" x2="256" y2="320"/>
    <line x1="512" y1="0" x2="512" y2="320"/>
    <line x1="768" y1="0" x2="768" y2="320"/>
    <line x1="1024" y1="0" x2="1024" y2="320"/>
  </g>

  <!-- Left side: shield/lock icon -->
  <g transform="translate(160, 100)" opacity="0.1">
    <path d="M0,-55 L48,-30 L48,15 C48,45 28,68 0,80 C-28,68 -48,45 -48,15 L-48,-30 Z" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="-12" y="-2" width="24" height="20" rx="3" fill="none" stroke="#6366f1" stroke-width="2"/>
    <path d="M-6,-2 V-10 C-6,-20 6,-20 6,-10 V-2" fill="none" stroke="#6366f1" stroke-width="2"/>
    <circle cx="0" cy="10" r="3" fill="#6366f1" opacity="0.8"/>
  </g>

  <!-- Left side: terminal window -->
  <g transform="translate(80, 210)" opacity="0.08">
    <rect x="0" y="0" width="120" height="80" rx="6" fill="none" stroke="#6366f1" stroke-width="1.5"/>
    <line x1="0" y1="16" x2="120" y2="16" stroke="#6366f1" stroke-width="1"/>
    <circle cx="12" cy="8" r="3" fill="#ef4444" opacity="0.6"/>
    <circle cx="24" cy="8" r="3" fill="#facc15" opacity="0.6"/>
    <circle cx="36" cy="8" r="3" fill="#10b981" opacity="0.6"/>
    <text x="10" y="34" font-family="'Courier New', monospace" font-size="9" fill="#6366f1">$ nmap -sV</text>
    <text x="10" y="48" font-family="'Courier New', monospace" font-size="9" fill="#6366f1">$ sqlmap -u</text>
    <text x="10" y="62" font-family="'Courier New', monospace" font-size="9" fill="#059669">$ python3</text>
  </g>

  <!-- Right side: candlestick mini chart -->
  <g transform="translate(1000, 60)" opacity="0.1">
    <line x1="0" y1="0" x2="0" y2="80" stroke="#6366f1" stroke-width="1.5"/>
    <line x1="0" y1="80" x2="120" y2="80" stroke="#6366f1" stroke-width="1.5"/>
    <line x1="15" y1="65" x2="15" y2="30" stroke="#059669" stroke-width="1"/>
    <rect x="11" y="38" width="8" height="20" fill="#059669" rx="1"/>
    <line x1="35" y1="55" x2="35" y2="18" stroke="#059669" stroke-width="1"/>
    <rect x="31" y="24" width="8" height="22" fill="#059669" rx="1"/>
    <line x1="55" y1="48" x2="55" y2="12" stroke="#dc2626" stroke-width="1"/>
    <rect x="51" y="16" width="8" height="20" fill="#dc2626" rx="1"/>
    <line x1="75" y1="42" x2="75" y2="5" stroke="#059669" stroke-width="1"/>
    <rect x="71" y="10" width="8" height="24" fill="#059669" rx="1"/>
    <line x1="95" y1="38" x2="95" y2="2" stroke="#059669" stroke-width="1"/>
    <rect x="91" y="5" width="8" height="26" fill="#059669" rx="1"/>
    <polyline points="15,45 35,30 55,25 75,18 95,12" fill="none" stroke="#d97706" stroke-width="1" opacity="0.5" stroke-dasharray="4,3"/>
  </g>

  <!-- Right side: network nodes -->
  <g transform="translate(1050, 200)" opacity="0.08">
    <circle cx="0" cy="0" r="5" fill="none" stroke="#db2777" stroke-width="1.5"/>
    <circle cx="50" cy="-20" r="5" fill="none" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="60" cy="30" r="5" fill="none" stroke="#db2777" stroke-width="1.5"/>
    <circle cx="100" cy="10" r="5" fill="none" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="110" cy="50" r="5" fill="none" stroke="#db2777" stroke-width="1.5"/>
    <circle cx="150" cy="-5" r="5" fill="none" stroke="#6366f1" stroke-width="1.5"/>
    <line x1="5" y1="-2" x2="45" y2="-18" stroke="#6366f1" stroke-width="0.8" opacity="0.5"/>
    <line x1="55" y1="-17" x2="95" y2="8" stroke="#6366f1" stroke-width="0.8" opacity="0.5"/>
    <line x1="3" y1="4" x2="55" y2="27" stroke="#db2777" stroke-width="0.8" opacity="0.5"/>
    <line x1="65" y1="30" x2="105" y2="12" stroke="#db2777" stroke-width="0.8" opacity="0.5"/>
    <line x1="105" y1="7" x2="145" y2="-3" stroke="#6366f1" stroke-width="0.8" opacity="0.5"/>
    <line x1="112" y1="47" x2="148" y2="-1" stroke="#db2777" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Glow behind name -->
  <ellipse cx="640" cy="120" rx="240" ry="60" fill="#6366f1" opacity="0.03"/>

  <!-- Top accent -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accent)" opacity="0.4"/>

  <!-- Name -->
  <text x="640" y="125" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="60" font-weight="700" fill="#4b5563" text-anchor="middle" letter-spacing="-1" filter="url(#shadow)">SkyzFallin</text>

  <!-- Subtitle -->
  <text x="640" y="162" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#475569" text-anchor="middle" font-style="italic" opacity="0.5">when the sky falls, buy the dip</text>

  <!-- Divider -->
  <line x1="510" y1="182" x2="770" y2="182" stroke="#6366f1" stroke-width="1" opacity="0.15"/>

  <!-- Category labels -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="500">
    <rect x="418" y="198" width="115" height="28" rx="14" fill="#dc2626" opacity="0.08"/>
    <rect x="418" y="198" width="115" height="28" rx="14" fill="none" stroke="#dc2626" stroke-width="0.5" opacity="0.3"/>
    <text x="475" y="216" fill="#dc2626" text-anchor="middle">Offensive Sec</text>

    <rect x="545" y="198" width="80" height="28" rx="14" fill="#059669" opacity="0.08"/>
    <rect x="545" y="198" width="80" height="28" rx="14" fill="none" stroke="#059669" stroke-width="0.5" opacity="0.3"/>
    <text x="585" y="216" fill="#059669" text-anchor="middle">Trading</text>

    <rect x="637" y="198" width="110" height="28" rx="14" fill="#6366f1" opacity="0.08"/>
    <rect x="637" y="198" width="110" height="28" rx="14" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.3"/>
    <text x="692" y="216" fill="#6366f1" text-anchor="middle">AI + Automation</text>

    <rect x="759" y="198" width="100" height="28" rx="14" fill="#db2777" opacity="0.08"/>
    <rect x="759" y="198" width="100" height="28" rx="14" fill="none" stroke="#db2777" stroke-width="0.5" opacity="0.3"/>
    <text x="809" y="216" fill="#db2777" text-anchor="middle">Web + Cloud</text>
  </g>

  <!-- Bottom tagline -->
  <text x="640" y="274" font-family="'Courier New', Courier, monospace" font-size="11" fill="#94a3b8" text-anchor="middle" letter-spacing="3">CYBERSECURITY  /  STOCK MARKET  /  AUTOMATION</text>

  <!-- Bottom accent -->
  <rect x="0" y="316" width="1280" height="4" fill="url(#accent)" opacity="0.4"/>
</svg>
